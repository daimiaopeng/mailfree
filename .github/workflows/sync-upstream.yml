name: Sync from idinging/freemail

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout my repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Save my local config
        run: |
          mkdir -p /tmp/mailfree-backup

          # 保留当前同步脚本，避免被上游仓库覆盖
          cp .github/workflows/sync-upstream.yml /tmp/mailfree-backup/sync-upstream.yml

          # 保留你自己的 Cloudflare 配置，里面有你自己的 D1 / R2 / 域名配置
          cp wrangler.toml /tmp/mailfree-backup/wrangler.toml || true

      - name: Sync upstream master to my main
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/idinging/freemail.git || git remote set-url upstream https://github.com/idinging/freemail.git
          git fetch upstream master

          git checkout main

          # 用上游 master 覆盖当前 main
          git reset --hard upstream/master

          # 删除上游仓库里的 workflows，避免 GITHUB_TOKEN 没有 workflows 权限导致 push 失败
          rm -rf .github/workflows
          mkdir -p .github/workflows

          # 恢复你自己的同步脚本
          cp /tmp/mailfree-backup/sync-upstream.yml .github/workflows/sync-upstream.yml

          # 恢复你自己的 wrangler.toml，避免 D1 database_id 又被上游覆盖
          cp /tmp/mailfree-backup/wrangler.toml wrangler.toml || true

          git add -A
          git commit -m "Sync from idinging/freemail" || echo "No changes to commit"

          git push origin main --force
